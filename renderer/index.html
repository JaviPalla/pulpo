<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <!-- style-src permite inline: los templates propios pintan colores de labels/lanes vía style=""; no se inyecta CSS de terceros -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src https: data:; font-src 'self'" />
  <title>Monstro</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="splash">
    <svg id="splash-monster" viewBox="0 0 1024 1024" aria-hidden="true">
      <defs>
        <linearGradient id="sp-body" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#5ff0b8"/>
          <stop offset="1" stop-color="#23c98c"/>
        </linearGradient>
      </defs>
      <g class="sp-bob">
        <g class="sp-horns">
          <path d="M 372 332 L 322 196 L 452 312 Z" fill="#2b2f55"/>
          <path d="M 652 332 L 702 196 L 572 312 Z" fill="#2b2f55"/>
        </g>
        <rect x="292" y="296" width="440" height="452" rx="158" fill="url(#sp-body)"/>
        <ellipse cx="392" cy="748" rx="62" ry="40" fill="#23c98c"/>
        <ellipse cx="632" cy="748" rx="62" ry="40" fill="#23c98c"/>
        <g class="sp-eye">
          <circle cx="512" cy="468" r="126" fill="#ffffff"/>
          <circle cx="512" cy="480" r="60" fill="#2b2f55"/>
          <circle cx="542" cy="452" r="22" fill="#ffffff"/>
          <rect class="sp-lid" x="386" y="342" width="252" height="252" rx="40" fill="#34dd9c"/>
        </g>
        <path d="M 416 606 Q 512 700 608 606 Z" fill="#2b2f55"/>
        <path d="M 466 612 L 502 612 L 484 660 Z" fill="#ffffff"/>
        <path d="M 540 612 L 576 612 L 558 654 Z" fill="#ffffff"/>
      </g>
    </svg>
    <div class="splash-word">Monstro</div>
    <div class="splash-dots"><span></span><span></span><span></span></div>
  </div>

  <header id="topbar">
    <div class="traffic-pad"></div>
    <div class="brand" title="Monstro">👾 <strong>Monstro</strong></div>
    <input id="search" type="search" placeholder="Filtrar…" data-i18n-placeholder="Filtrar…" />
    <button id="refresh" class="icon-btn" title="Refrescar (R)" data-i18n-title="Refrescar (R)">⟳</button>
    <button id="settings-btn" class="icon-btn" title="Ajustes" data-i18n-title="Ajustes">⚙</button>
    <div id="me" class="me"></div>
  </header>

  <div id="layout">
    <nav id="sidebar">
      <select id="repo-select" title="Repositorio" data-i18n-title="Repositorio"></select>
      <div class="nav-section" data-i18n="Pull requests"><svg class="ico sec-prs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><line x1="6" x2="6" y1="9" y2="21"/></svg>Pull requests</div>
      <button class="bucket active" data-bucket="open" data-i18n="Abiertas"><svg class="ico ico-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="1"/></svg>Abiertas <span class="count" id="count-open"></span></button>
      <button class="bucket" data-bucket="mine" data-i18n="Mías"><svg class="ico ico-mine" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Mías <span class="count" id="count-mine"></span></button>
      <button class="bucket" data-bucket="review" data-i18n="Para revisar"><svg class="ico ico-review" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>Para revisar <span class="count" id="count-review"></span></button>
      <button class="bucket" data-bucket="draft" data-i18n="Borradores"><svg class="ico ico-draft" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.364 13.634a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506l4.013-4.009a1 1 0 0 0-3.004-3.004z"/><path d="M14.487 7.858A1 1 0 0 1 14 7V2"/><path d="M20 19.645V20a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l2.516 2.516"/><path d="M8 18h1"/></svg>Borradores <span class="count" id="count-draft"></span></button>
      <div class="nav-section" data-i18n="Historial"><svg class="ico sec-history" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>Historial</div>
      <button class="bucket" data-bucket="merged" data-i18n="Fusionadas"><svg class="ico ico-merged" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 21V9a9 9 0 0 0 9 9"/></svg>Fusionadas</button>
      <button class="bucket" data-bucket="closed" data-i18n="Cerradas"><svg class="ico ico-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>Cerradas</button>
      <div class="nav-section" data-i18n="Repositorio"><svg class="ico sec-repo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 19a5 5 0 0 1-5-5v8"/><path d="M9 20H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H20a2 2 0 0 1 2 2v5"/><circle cx="13" cy="12" r="2"/><circle cx="20" cy="19" r="2"/></svg>Repositorio</div>
      <button class="bucket" id="bucket-history" data-i18n="Histórico"><svg class="ico ico-graph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="6" r="3"/><path d="M5 9v6"/><circle cx="5" cy="18" r="3"/><path d="M12 3v18"/><circle cx="19" cy="6" r="3"/><path d="M16 15.7A9 9 0 0 0 19 9"/></svg>Histórico</button>
      <div class="nav-section" id="nav-milestones-section" data-i18n="Milestones"><svg class="ico sec-milestones" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 13v8"/><path d="M12 3v3"/><path d="M18.172 6a2 2 0 0 1 1.414.586l2.06 2.06a1.207 1.207 0 0 1 0 1.708l-2.06 2.06a2 2 0 0 1-1.414.586H4a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1z"/></svg>Milestones</div>
      <button class="bucket" id="bucket-milestones" data-i18n="Tareas por persona"><svg class="ico ico-milestone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><path d="M16 3.128a4 4 0 0 1 0 7.744"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="9" cy="7" r="4"/></svg>Tareas por persona</button>
      <div class="nav-section" id="nav-releases-section" data-i18n="Releases"><svg class="ico sec-releases" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" x2="6" y1="3" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>Releases</div>
      <button class="bucket" id="bucket-releases" data-i18n="Ramas"><svg class="ico ico-releases" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" x2="6" y1="3" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>Ramas</button>
      <button class="bucket" id="bucket-releases-publish" data-i18n="Publicar"><svg class="ico ico-releases" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h.01"/><path d="M3.3 11.3a2.4 2.4 0 0 0 0 3.4l6 6a2.4 2.4 0 0 0 3.4 0l8-8a2 2 0 0 0 .6-1.4V5a2 2 0 0 0-2-2h-5.3a2 2 0 0 0-1.4.6z"/></svg>Publicar</button>
      <div class="nav-section" id="nav-local-section" data-i18n="Trabajo local"><svg class="ico sec-local" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M7 16h8"/><path d="M7 11h12"/><path d="M7 6h3"/></svg>Trabajo local</div>
      <button class="bucket" id="bucket-local-empezar" data-i18n="Empezar tarea"><svg class="ico ico-local-empezar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>Empezar tarea</button>
      <button class="bucket" id="bucket-local-crear" data-i18n="Crear tarea"><svg class="ico ico-local-crear" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>Crear tarea</button>
      <button class="bucket" id="bucket-local-vincular" data-i18n="Vincular tarea"><svg class="ico ico-local-vincular" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>Vincular tarea</button>
      <button class="bucket" id="bucket-local-historico" data-i18n="Histórico"><svg class="ico ico-local-historico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>Histórico</button>
    </nav>

    <main id="list-pane">
      <div id="pr-list"></div>
    </main>

    <aside id="detail-pane" class="hidden">
      <div id="detail-content"></div>
    </aside>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root"></div>
  <div id="settings-root" class="hidden"></div>

  <script src="graph.js"></script>
  <script src="highlight.js"></script>
  <!-- app.js troceado por feature (OPE-21): scripts clásicos en ámbito global compartido.
       core primero (estado/utilidades compartidas), boot último (arranque + listeners). -->
  <script src="app/core.js"></script>
  <script src="app/i18n.js"></script>
  <script src="app/drafts.js"></script>
  <script src="app/prlist.js"></script>
  <script src="app/detail.js"></script>
  <script src="app/changes.js"></script>
  <script src="app/actions.js"></script>
  <script src="app/history.js"></script>
  <script src="app/poll.js"></script>
  <script src="app/settings.js"></script>
  <script src="app/milestones.js"></script>
  <script src="app/milestones-summary.js"></script>
  <script src="app/releases.js"></script>
  <script src="app/local.js"></script>
  <script src="app/releases-publish.js"></script>
  <script src="app/boot.js"></script>
</body>
</html>
